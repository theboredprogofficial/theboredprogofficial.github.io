<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>All products — unit.</title>
    <link rel="stylesheet" href="/css/style.css">
    <meta name="description" content="All precision tools by unit. Download files or buy assembled kits.">
    <style>
        /* Stili per la griglia prodotti (copiati da style.css + fix) */
        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 32px;
            margin: 48px 0;
        }
        
        .product-teaser {
            background: #111111;
            border: 1px solid #222;
            transition: border-color 0.2s;
            text-decoration: none;
            color: inherit;
            display: block;
        }
        
        .product-teaser:hover {
            border-color: #444;
        }
        
        .product-teaser-image {
            background: #0A0A0A;
            aspect-ratio: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            border-bottom: 1px solid #222;
            overflow: hidden;
        }
        
        .product-teaser-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }
        
        .product-teaser-content {
            padding: 24px;
        }
        
        .product-teaser-content h3 {
            margin: 0 0 8px 0;
            font-size: 20px;
        }
        
        .product-teaser-content .price {
            font-size: 18px;
            margin: 12px 0 0 0;
        }
        
        .product-teaser-content .badge {
            margin-bottom: 12px;
        }
        
        .placeholder-image {
            width: 60%;
            height: auto;
            opacity: 0.3;
            font-size: 48px;
            text-align: center;
        }
    </style>
</head>
<body>
    <main>
        <div class="container">
            <section>
                <h2>Products</h2>
                <div class="products-grid" id="products-grid">
                    <div class="text-muted">Loading...</div>
                </div>
            </section>
        </div>
    </main>

    <script src="/js/products-data.js"></script>
    <script src="/js/main.js"></script>
    <script>
        const productsArray = Object.entries(PRODUCTS).map(([id, data]) => ({ id, ...data }));
        const grid = document.getElementById('products-grid');
        
        function getProductImage(product) {
            if (product.gallery && product.gallery.length > 0) {
                const blueprint = product.gallery.find(item => item.src.toLowerCase().includes('blueprint'));
                return blueprint ? blueprint.src : product.gallery[0].src;
            }
            return '';
        }
        
        if (productsArray.length > 0) {
            grid.innerHTML = '';
            productsArray.forEach(product => {
                const imgSrc = getProductImage(product);
                grid.innerHTML += `
                    <a href="product.html?id=${product.id}" class="product-teaser">
                        <div class="product-teaser-image">
                            ${imgSrc ? `<img src="${imgSrc}" alt="${product.name}">` : '<div class="placeholder-image">⌘</div>'}
                        </div>
                        <div class="product-teaser-content">
                            <div class="badge">${product.badge || 'release'}</div>
                            <h3>${product.name}</h3>
                            <p class="text-muted" style="font-size: 13px; margin: 8px 0;">${product.tagline}</p>
                            <div class="price">${product.priceDigital}€ <small>digital</small> / ${product.priceKit}€ <small>kit</small></div>
                        </div>
                    </a>
                `;
            });
        } else {
            grid.innerHTML = '<p class="text-muted">No products yet.</p>';
        }
    </script>
</body>
</html>
