<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="page-title">Product — unit.</title>
    <link rel="stylesheet" href="/css/style.css">
    <meta name="description" id="meta-description" content="Precision tool by unit.">
    <!-- Favicon -->
    <link rel="icon" type="image/png" sizes="16x16" href="/assets/favicon/favicon-16x16.png">
    <link rel="icon" type="image/png" sizes="32x32" href="/assets/favicon/favicon-32x32.png">
    <link rel="apple-touch-icon" sizes="180x180" href="/assets/favicon/apple-touch-icon.png">
    <link rel="icon" type="image/x-icon" href="/assets/favicon/favicon.ico">
    <link rel="manifest" href="/assets/favicon/site.webmanifest">
    <style>
        .preview-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 32px;
            margin: 32px 0;
        }

        .preview-item {
            background: #111111;
            border: 1px solid #222;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .preview-content {
            flex: 1;
            position: relative;
            background: #0A0A0A;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 480px;
        }

        #sketchfab-container {
            position: relative !important;
        }
        
        #sketchfab-container iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }

        .blueprint-image {
            max-width: 100%;
            max-height: 100%;
            width: auto;
            height: auto;
            object-fit: contain;
            display: block;
            background: #0A0A0A;
            cursor: crosshair;
        }

        .zoom-lens {
            position: absolute;
            border: 2px solid #FFFFFF;
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(1px);
            pointer-events: none;
            display: none;
            z-index: 10;
        }

        .zoom-result {
            position: fixed;
            bottom: 24px;
            right: 24px;
            width: 350px;
            height: 350px;
            border: 1px solid #333;
            background: #0A0A0A;
            overflow: hidden;
            display: none;
            z-index: 100;
            box-shadow: 0 8px 24px rgba(0,0,0,0.5);
            border-radius: 16px;
            pointer-events: none;
        }

        .zoom-result img {
            position: absolute;
            width: auto;
            height: auto;
        }

        .lightbox {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.95);
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            backdrop-filter: blur(8px);
        }

        .lightbox .close {
            position: absolute;
            top: 24px;
            right: 32px;
            color: white;
            font-size: 32px;
            cursor: pointer;
            font-family: monospace;
        }

        .lightbox-content {
            width: 90%;
            height: 90%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .lightbox-image {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
            cursor: pointer;
        }

        @media (max-width: 700px) {
            .preview-grid {
                grid-template-columns: 1fr;
                gap: 24px;
            }
            .zoom-result {
                display: none !important;
            }
            .zoom-lens {
                display: none !important;
            }
        }
    </style>
</head>
<body>
    <main>
        <div class="container">
            <section>
                <div class="badge" id="product-badge">Loading...</div>
                <h1 style="font-size: 48px; margin-bottom: 8px;" id="product-name">—</h1>
                <p style="font-size: 18px; color: #888; margin-bottom: 32px;" id="product-tagline"></p>
                
                <p id="product-description" style="margin: 24px 0; color: #BBB;"></p>
                
                <div class="preview-grid">
                    <div class="preview-item">
                        <div class="preview-content" id="sketchfab-container" style="position: relative;">
                            <div style="text-align: center; padding: 40px;">
                                <span class="text-muted">Loading 3D model...</span>
                            </div>
                        </div>
                    </div>
                    
                    <div class="preview-item">
                        <div class="preview-content" id="blueprint-container">
                            <img id="blueprint-image" class="blueprint-image" src="" alt="">
                        </div>
                    </div>
                </div>

                <div class="specs" id="product-specs">
                    <h3 style="margin-top: 0;">Technical specifications</h3>
                </div>
                
                <div style="margin: 32px 0;" id="product-downloads"></div>
                
                <div class="specs" style="background: #1A1A1A;" id="product-kit"></div>
            </section>
        </div>
    </main>

    <script src="/js/products-data.js"></script>
    <script src="/js/main.js"></script>
    <script>
        // Legge l'ID del prodotto dall'URL (es. ?id=nori)
        const urlParams = new URLSearchParams(window.location.search);
        const productId = urlParams.get('id');
        
        if (!productId || !PRODUCTS[productId]) {
            // Prodotto non trovato → redirect alla pagina prodotti
            window.location.href = '/products/index.html';
        }
        
        const product = PRODUCTS[productId];
        
        // Aggiorna title e meta description
        document.title = `${product.name} — unit.`;
        document.getElementById('meta-description').setAttribute('content', product.description || product.tagline);
        
        // Popola i campi base
        document.getElementById('product-badge').textContent = product.badge;
        document.getElementById('product-name').textContent = product.name;
        document.getElementById('product-tagline').textContent = product.tagline;
        document.getElementById('product-description').textContent = product.longDescription || product.description;
        
        // -------------------------------
        // BLUEPRINT + ZOOM
        // -------------------------------
        const blueprintImage = document.getElementById('blueprint-image');
        
        // Trova l'immagine del blueprint (se esiste)
        let blueprintSrc = '';
        
        if (product.gallery && product.gallery.length > 0) {
            const blueprint = product.gallery.find(item => item.src.toLowerCase().includes('blueprint'));
            if (blueprint) {
                blueprintSrc = blueprint.src;
            } else {
                blueprintSrc = product.gallery[0].src;
            }
            
            blueprintImage.src = blueprintSrc;
            blueprintImage.alt = product.name;
            
            // Setup zoom
            const container = document.getElementById('blueprint-container');
            const lens = document.createElement('div');
            lens.className = 'zoom-lens';
            const result = document.createElement('div');
            result.className = 'zoom-result';
            const resultImg = document.createElement('img');
            resultImg.src = blueprintSrc;
            result.appendChild(resultImg);
            container.appendChild(lens);
            container.appendChild(result);
            
            function zoom(e) {
                const imgRect = blueprintImage.getBoundingClientRect();
                let x = e.clientX - imgRect.left;
                let y = e.clientY - imgRect.top;
                if (x < 0 || y < 0 || x > imgRect.width || y > imgRect.height) {
                    lens.style.display = 'none';
                    result.style.display = 'none';
                    return;
                }
                lens.style.display = 'block';
                result.style.display = 'block';
                const lensWidth = 100;
                const lensHeight = 100;
                x = Math.min(Math.max(x, lensWidth/2), imgRect.width - lensWidth/2);
                y = Math.min(Math.max(y, lensHeight/2), imgRect.height - lensHeight/2);
                const containerRect = container.getBoundingClientRect();
                lens.style.left = (imgRect.left + x - lensWidth/2 - containerRect.left) + 'px';
                lens.style.top = (imgRect.top + y - lensHeight/2 - containerRect.top) + 'px';
                const zoomLevel = 0.5;
                const percentX = x / imgRect.width;
                const percentY = y / imgRect.height;
                resultImg.style.width = (blueprintImage.naturalWidth * zoomLevel) + 'px';
                resultImg.style.height = (blueprintImage.naturalHeight * zoomLevel) + 'px';
                resultImg.style.left = -(percentX * blueprintImage.naturalWidth * zoomLevel - result.clientWidth/2) + 'px';
                resultImg.style.top = -(percentY * blueprintImage.naturalHeight * zoomLevel - result.clientHeight/2) + 'px';
            }
            
            blueprintImage.addEventListener('mousemove', zoom);
            blueprintImage.addEventListener('mouseleave', () => {
                lens.style.display = 'none';
                result.style.display = 'none';
            });
            
            // Lightbox sul click
            blueprintImage.addEventListener('click', () => {
                const lightbox = document.createElement('div');
                lightbox.className = 'lightbox';
                lightbox.innerHTML = `<div class="close">✕</div><div class="lightbox-content"><img class="lightbox-image" src="${blueprintSrc}"></div>`;
                document.body.appendChild(lightbox);
                const close = () => lightbox.remove();
                lightbox.querySelector('.close').addEventListener('click', close);
                lightbox.addEventListener('click', (e) => { if (e.target === lightbox) close(); });
                lightbox.querySelector('.lightbox-image').addEventListener('click', close);
            });
        }
        
        // -------------------------------
        // SKETCHFAB 3D
        // -------------------------------
        const sketchfabContainer = document.getElementById('sketchfab-container');
        if (product.sketchfabId) {
            sketchfabContainer.innerHTML = `<iframe src="https://sketchfab.com/models/${product.sketchfabId}/embed?autostart=1" style="position: absolute; top: 0; left: 0; width: 100%; height: 100%;" frameborder="0" allow="autoplay; fullscreen; xr-spatial-tracking" allowfullscreen></iframe>`;
        } else {
            sketchfabContainer.innerHTML = `<div style="display: flex; align-items: center; justify-content: center; height: 100%;"><span class="text-muted">⌘ 3D preview coming soon</span></div>`;
        }
        
        // -------------------------------
        // SPECIFICHE TECNICHE
        // -------------------------------
        const specsDiv = document.getElementById('product-specs');
        const specsTable = document.createElement('table');
        for (const [key, value] of Object.entries(product.specs)) {
            const row = specsTable.insertRow();
            row.insertCell(0).textContent = key;
            row.insertCell(1).textContent = value;
        }
        specsDiv.appendChild(specsTable);
        
        // -------------------------------
        // DOWNLOADS
        // -------------------------------
        const downloadsDiv = document.getElementById('product-downloads');

        // Genera il link Gumroad basato sull'ID del prodotto
        // Per Nori: https://unitdesignstudio.gumroad.com/l/nori
        // Per altri prodotti: https://unitdesignstudio.gumroad.com/l/{productId}
        const gumroadLink = `https://unitdesignstudio.gumroad.com/l/${productId}`;

        downloadsDiv.innerHTML = `
            <h3>3D model</h3>
            <a href="${gumroadLink}" target="_blank" class="btn" style="background:#FFFFFF; color:#0A0A0A;">Buy now — ${product.priceDigital}€ →</a>
            <div class="badge" style="margin-top: 16px; display: inline-block; margin-left: 12px;">Instant download · No DRM</div>
            <p class="text-muted" style="margin-top: 12px; font-size: 12px;">STL + STEP + print profile. Print at home or modify it.</p>
        `;
        
        // -------------------------------
        // KIT FISICO
        // -------------------------------
        const kitDiv = document.getElementById('product-kit');
        if (product.kitStatus === 'coming soon') {
            kitDiv.innerHTML = `
                <h3 style="margin-top: 0;">🖨️ Buy printed kit — ${product.priceKit}€</h3>
                <p>Includes: PETG black print (0.12mm, annealed), TPU gasket pre-installed, assembled, QC tested, recycled cardboard box + insert, tracked shipping.</p>
                <div class="badge" style="background:#2A2A2A;">Coming soon — notify me</div>
                <div style="margin-top: 16px;">
                    <input type="email" id="notify-email" placeholder="your@email.com" style="width: 260px; display: inline-block; margin-right: 8px;">
                    <button id="notify-btn">Notify me</button>
                </div>
            `;
            document.getElementById('notify-btn')?.addEventListener('click', () => {
                const email = document.getElementById('notify-email')?.value;
                if(email) {
                    let waitingList = JSON.parse(localStorage.getItem(`${productId}-waitlist`) || '[]');
                    if (!waitingList.includes(email)) {
                        waitingList.push(email);
                        localStorage.setItem(`${productId}-waitlist`, JSON.stringify(waitingList));
                        alert(`✅ ${email} — you'll be notified when the ${product.name} kit is available.`);
                    } else {
                        alert('You are already on the list!');
                    }
                } else {
                    alert('Please enter an email address.');
                }
            });
        } else {
            kitDiv.innerHTML = `
                <h3 style="margin-top: 0;">🖨️ Buy printed kit — ${product.priceKit}€</h3>
                <p>Includes: PETG black print (0.12mm, annealed), TPU gasket pre-installed, assembled, QC tested, recycled cardboard box + insert, tracked shipping.</p>
                <a href="#" class="btn">Add to cart →</a>
            `;
        }
    </script>
</body>
</html>
